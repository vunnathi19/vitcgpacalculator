<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>VIT Academic Suite</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<h1>🎓 VIT GPA + CGPA + ANALYZER</h1>

<!-- GPA -->
<section>
<h2>📊 GPA CALCULATOR</h2>

<table id="gpaTable">
<tr>
<th>Subject</th><th>Credits</th><th>Grade</th><th>GP</th><th>Total</th>
</tr>
</table>

<button onclick="addRow()">Add Subject</button>
<button onclick="calcGPA()">Calculate GPA</button>

<p id="gpaOut"></p>
</section>

<!-- CGPA -->
<section>
<h2>📈 CGPA CALCULATOR</h2>

<table id="cgpaTable">
<tr>
<th>Semester</th><th>GPA</th><th>Credits</th>
</tr>
</table>

<button onclick="addSem()">Add Semester</button>
<button onclick="calcCGPA()">Calculate CGPA</button>

<p id="cgpaOut"></p>
</section>

<!-- ANALYZER -->
<section>
<h2>🧠 SCREENSHOT ANALYZER</h2>

<input type="file" id="img">
<button onclick="analyse()">Analyze</button>

<pre id="out"></pre>

</section>

<script src="script.js"></script>
</body>
</html>
