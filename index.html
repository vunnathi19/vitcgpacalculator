<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIT GPA & CGPA Adviser</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
s
<!-- LOADER -->
<div id="loader">
  <h1>🎓 VIT Academic System</h1>
  <p>Loading...</p>
</div>

<div id="app">

<h1>📘 GPA & CGPA System</h1>

<!-- GPA -->
<section>
<h2>📊 GPA Calculator</h2>

<table id="gpaTable">
<tr>
<th>Subject</th><th>Credits</th><th>Grade</th><th>GP</th><th>Total</th>
</tr>
</table>

<button onclick="addRow()">Add Subject</button>
<button onclick="calcGPA()">Calculate GPA</button>

<div class="result" id="gpaOut"></div>
</section>

<!-- CGPA -->
<section>
<h2>📈 CGPA Calculator</h2>

<table id="cgpaTable">
<tr>
<th>Semester</th><th>GPA</th><th>Credits</th>
</tr>
</table>

<button onclick="addSem()">Add Semester</button>
<button onclick="calcCGPA()">Calculate CGPA</button>

<div class="result" id="cgpaOut"></div>
</section>

<!-- ADVISER -->
<section>
<h2>🧠 Adviser (Grade Analysis)</h2>

<input type="file" id="img">
<button onclick="analyse()">Analyze Screenshot</button>

<div class="result" id="advice"></div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
